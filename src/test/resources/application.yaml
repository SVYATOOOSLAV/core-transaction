server:
  port: 8081


spring:
  application:
    name: core-transaction
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://localhost:1234/test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    show-sql: true
    properties:
      hibernate:
        format-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
