server:
  port: 8081


spring:
  application:
    name: core-transaction
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://localhost:1234/test
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 2000
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    show-sql: false
    properties:
      hibernate:
        format-sql: false
  liquibase:
    enabled: true
    change-log: 'classpath:db/changelog/db.changelog-master.xml'

outbox:
  consumer-enabled: false
