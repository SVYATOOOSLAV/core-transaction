services:
  transactionDB:
    container_name: transaction_container
    image: postgres:16
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - transaction_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: always

volumes:
  transaction_pgdata:
